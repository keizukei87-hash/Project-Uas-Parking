<!DOCTYPE html>
<html>
<head>
<title>Laporan Parkir Liar</title>
<style>
body{
    background:#020d26;
    color:white;
    font-family:Arial;
}

.container{
    padding:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#081a3a;
}

th, td{
    padding:12px;
    border-bottom:1px solid #1c2e5a;
}

th{
    background:#0b2454;
}
.btn-kembali-fixed {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 999;

    background: #071633;
    color: #ffc107;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #ffc107;

    text-decoration: none;
    font-size: 14px;
    font-weight: bold;

    transition: 0.3s;
}

/* Hover effect */
.btn-kembali-fixed:hover {
    background: #ffc107;
    color: #000;
}
/* LOADER BACKGROUND */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(2, 6, 23, 0.9); /* dark premium */
    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;

    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

/* AKTIF */
#loader.active {
    opacity: 1;
    visibility: visible;
}

/* SPINNER */
.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #1e293b;
    border-top: 5px solid #ffc107; /* emas */
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* ANIMASI */
@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
</style>
</head>

<div id="loader">
    <div class="spinner"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const loader = document.getElementById("loader");

    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function (e) {

            const href = this.getAttribute("href");

            if (!href || href.startsWith("#")) return;
            if (this.hostname !== window.location.hostname) return;

            e.preventDefault();

            // tampilkan loader
            loader.classList.add("active");

            setTimeout(() => {
                window.location.href = href;
            }, 500);
        });

    });

});
</script>

<body>

<a href="/dashboard" class="btn-kembali-fixed">← Dashboard</a>

<div class="container">
<h2>Laporan Parkir Liar</h2>

<table>
<tr>
<th>No</th>
<th>Area</th>
<th>Plat</th>
<th>Keterangan</th>
<th>Foto</th>
</tr>

{% for d in data %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td>{{ d[3] }}</td>

<td>
    {% if d[4] %}
        <a href="{{ url_for('static', filename='uploads/' + d[4]) }}" target="_blank">
    <img src="{{ url_for('static', filename='uploads/' + d[4]) }}" 
     width="120" 
     onclick="showImage(this.src)" 
     style="cursor:pointer;">
</a>
    {% else %}
        Tidak ada foto
    {% endif %}
</td>

</tr>
{% endfor %}

</table>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
    <img id="modal-img" style="max-width:80%; max-height:80%; border:3px solid white;">
</div>

</div>

</body>
</html>
