<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - E Parking</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #050816, #0a1f44);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

/* CARD */
.container {
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0, 153, 255, 0.3);
    text-align: center;
}

/* TITLE */
h2 {
    color: #00d9ff;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00d9ff;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    transition: 0.3s;
}

input:focus {
    box-shadow: 0 0 10px #00d9ff;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #00d9ff, #0066ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 15px #00d9ff;
    transform: scale(1.05);
}

/* LINK */
a {
    color: #00d9ff;
    text-decoration: none;
}
        /* LOADER BACKGROUND */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(2, 6, 23, 0.9); /* dark premium */
    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;

    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

/* AKTIF */
#loader.active {
    opacity: 1;
    visibility: visible;
}

/* SPINNER */
.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #1e293b;
    border-top: 5px solid #ffc107; /* emas */
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* ANIMASI */
@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
    </style>
</head>

<div id="loader">
    <div class="spinner"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const loader = document.getElementById("loader");

    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function (e) {

            const href = this.getAttribute("href");

            if (!href || href.startsWith("#")) return;
            if (this.hostname !== window.location.hostname) return;

            e.preventDefault();

            // tampilkan loader
            loader.classList.add("active");

            setTimeout(() => {
                window.location.href = href;
            }, 500);
        });

    });

});
</script>

<body>

<div class="login-box">
    <h2>🚗 Campus E-Parking Area </h2>

    <form method="POST" action="/login">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

    <a href="/register" class="register-link">
        Belum punya akun? Daftar
    </a>
</div>

</body>
</html>
