<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - E Parking</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #050816, #0a1f44);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

/* CARD FORM */
.register-box {
    width: 100%;
    max-width: 420px; /* 🔥 biar tidak kepanjangan */
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(0, 153, 255, 0.3);
    text-align: center;
}

/* TITLE */
h2 {
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    box-sizing: border-box;
}

input:focus {
    box-shadow: 0 0 10px #00ffcc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #00ffcc, #00cc99);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 15px #00ffcc;
    transform: scale(1.05);
}

/* LINK */
a {
    color: #00ffcc;
    text-decoration: none;
    display: block;
    margin-top: 15px;
}

/* LOADER */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2, 6, 23, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

#loader.active {
    opacity: 1;
    visibility: visible;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #1e293b;
    border-top: 5px solid #ffc107;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
</div>

<!-- FORM -->
<div class="register-box">
    <h2>🚀 Daftar Akun</h2>

    <form method="POST" action="/do_register">

        <input type="text" name="nama" placeholder="Nama Lengkap" required>
        <input type="text" name="nim" placeholder="NIM" required>
        <input type="text" name="fakultas" placeholder="Fakultas" required>
        <input type="text" name="nohp" placeholder="Nomor HP" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Daftar</button>
    </form>

    <a href="/">Sudah punya akun? Login</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const loader = document.getElementById("loader");

    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function (e) {

            const href = this.getAttribute("href");

            if (!href || href.startsWith("#")) return;
            if (this.hostname !== window.location.hostname) return;

            e.preventDefault();

            loader.classList.add("active");

            setTimeout(() => {
                window.location.href = href;
            }, 400);

        });

    });

});
</script>

</body>
</html>
