<!DOCTYPE html>
<html>
<head>
<title>Kelola Area Parkir</title>
<style>
body{
    background:#020d26;
    color:white;
    font-family:Arial;
}

.container{
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:#081a3a;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.tersedia{
    color:#00ff9d;
}

.penuh{
    color:#ff4d4d;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#ffc107;
    cursor:pointer;
}
.btn-kembali-fixed {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 999;

    background: #071633;
    color: #ffc107;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #ffc107;

    text-decoration: none;
    font-size: 14px;
    font-weight: bold;

    transition: 0.3s;
}

/* Hover effect */
.btn-kembali-fixed:hover {
    background: #ffc107;
    color: #000;
}
/* LOADER BACKGROUND */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(2, 6, 23, 0.9); /* dark premium */
    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;

    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

/* AKTIF */
#loader.active {
    opacity: 1;
    visibility: visible;
}

/* SPINNER */
.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #1e293b;
    border-top: 5px solid #ffc107; /* emas */
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* ANIMASI */
@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
</style>
</head>

<div id="loader">
    <div class="spinner"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const loader = document.getElementById("loader");

    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function (e) {

            const href = this.getAttribute("href");

            if (!href || href.startsWith("#")) return;
            if (this.hostname !== window.location.hostname) return;

            e.preventDefault();

            // tampilkan loader
            loader.classList.add("active");

            setTimeout(() => {
                window.location.href = href;
            }, 500);
        });

    });

});
</script>

<body>

<a href="/dashboard" class="btn-kembali-fixed">← Dashboard</a>

<div class="container">
<h2>Kelola Area Parkir</h2>

<div class="grid">
{% for d in data %}
<div class="card">
<h3>{{ d[1] }}</h3>

{% if d[2] == 'Tersedia' %}
<p class="tersedia">{{ d[2] }}</p>
{% else %}
<p class="penuh">{{ d[2] }}</p>
{% endif %}

<a href="/admin/update_area/{{ d[0] }}">
<button>Ubah Status</button>
</a>

</div>
{% endfor %}
</div>

</div>

</body>
</html>
