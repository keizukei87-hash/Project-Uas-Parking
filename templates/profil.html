<!DOCTYPE html>
<html>
<head>
<title>Profil User</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:#e2e8f0;
}

.container{
    padding:40px;
}

.profile-card{
    max-width:600px;
    margin:auto;
    background:rgba(15,23,42,0.7);
    padding:30px;
    border-radius:15px;
    border:1px solid rgba(255,215,0,0.15);
    backdrop-filter: blur(10px);
}

.profile-header{
    text-align:center;
    margin-bottom:20px;
}

.profile-img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid #facc15;
    margin-bottom:10px;
}

h2{
    color:#facc15;
}

.profile-info{
    margin-top:20px;
}

.info{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #1e293b;
}

.label{
    color:#94a3b8;
}

.value{
    font-weight:bold;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#facc15;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#eab308;
}
.btn-kembali-fixed {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 999;

    background: #071633;
    color: #ffc107;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #ffc107;

    text-decoration: none;
    font-size: 14px;
    font-weight: bold;

    transition: 0.3s;
}

/* Hover effect */
.btn-kembali-fixed:hover {
    background: #ffc107;
    color: #000;
}
/* LOADER BACKGROUND */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(2, 6, 23, 0.9); /* dark premium */
    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;

    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

/* AKTIF */
#loader.active {
    opacity: 1;
    visibility: visible;
}

/* SPINNER */
.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #1e293b;
    border-top: 5px solid #ffc107; /* emas */
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* ANIMASI */
@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
</style>

</head>

<div id="loader">
    <div class="spinner"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const loader = document.getElementById("loader");

    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function (e) {

            const href = this.getAttribute("href");

            if (!href || href.startsWith("#")) return;
            if (this.hostname !== window.location.hostname) return;

            e.preventDefault();

            // tampilkan loader
            loader.classList.add("active");

            setTimeout(() => {
                window.location.href = href;
            }, 500);
        });

    });

});
</script>

<body>

<a href="/dashboard" class="btn-kembali-fixed">← Dashboard</a>


<div class="container">

<div class="profile-card">

<div class="profile-header">
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">
<h2>Profil User</h2>
</div>

<div class="profile-info">

<div class="info">
<span class="label">Nama</span>
<span class="value">{{ session.nama }}</span>
</div>

<div class="info">
<span class="label">Username</span>
<span class="value">{{ session.username }}</span>
</div>

<div class="info">
<span class="label">Email</span>
<span class="value">{{ session.email }}</span>
</div>

<div class="info">
<span class="label">No HP</span>
<span class="value">{{ session.nohp }}</span>
</div>

</div>

<button>Edit Profil</button>

</div>

</div>

</body>
</html>
